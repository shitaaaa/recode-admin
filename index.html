<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工時記錄器｜後台管理</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ 請填入你的 Firebase 設定（與 index.html 相同）
  const firebaseConfig = {
    apiKey: "AIzaSyB1VFg1wtVsa6NYInsVue00wSpKkiP4FGo",
    authDomain: "recode-5fb20.firebaseapp.com",
    projectId: "recode-5fb20",
    storageBucket: "recode-5fb20.firebasestorage.app",
    messagingSenderId: "333904261286",
    appId: "1:333904261286:web:625cd2710b762ab4244467",
    measurementId: "G-HFWQPEFM48"
  };

  const ADMIN_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; // 1234

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allUsers = [];
  let allRecords = [];
  let currentView = "all"; // "all" | userId

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  async function checkLogin() {
    const pw = document.getElementById("pw-input").value;
    const hash = await sha256(pw);
    if (hash !== ADMIN_HASH) { alert("密碼錯誤"); return; }
    document.getElementById("login-screen").style.display = "none";
    const appScreen = document.getElementById("app-screen");
    appScreen.style.display = "flex";
    appScreen.style.flexDirection = "column";
    appScreen.style.height = "100vh";
    loadAll();
  }

  async function loadAll() {
    setLoading(true);
    // 載入所有 users
    const uSnap = await getDocs(collection(db, "users"));
    allUsers = uSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allUsers.sort((a, b) => (a.nickname || a.id).localeCompare(b.nickname || b.id, "zh-TW"));

    // 載入所有 records
    const rSnap = await getDocs(collection(db, "records"));
    allRecords = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allRecords.sort((a, b) => (b.date + (b.createdAt||"")) > (a.date + (a.createdAt||"")) ? 1 : -1);

    renderSidebar();
    renderTable("all");
    setLoading(false);
  }

  function setLoading(on) {
    document.getElementById("loading").style.display = on ? "" : "none";
  }

  function renderSidebar() {
    const ul = document.getElementById("user-list");
    const totalH = allRecords.reduce((s, r) => s + (r.hours || 0), 0);
    const totalCount = allRecords.length;

    ul.innerHTML = `
      <li class="user-item ${currentView === 'all' ? 'active' : ''}" onclick="switchView('all')">
        <span>📋 全部成員</span>
        <span class="count-badge">${totalCount} 筆 / ${totalH % 1 === 0 ? totalH : totalH.toFixed(1)}h</span>
      </li>
    ` + allUsers.map(u => {
      const recs = allRecords.filter(r => r.userId === u.id);
      const h = recs.reduce((s, r) => s + (r.hours || 0), 0);
      return `
        <li class="user-item ${currentView === u.id ? 'active' : ''}" onclick="switchView('${u.id}')">
          <span class="user-name-item">${escHtml(u.nickname || u.id)}</span>
          <span class="count-badge">${recs.length} 筆 / ${h % 1 === 0 ? h : h.toFixed(1)}h</span>
        </li>
      `;
    }).join("");
  }

  function switchView(userId) {
    currentView = userId;
    renderSidebar();
    renderTable(userId);
  }
  window.switchView = switchView;

  function renderTable(userId) {
    const filtered = userId === "all" ? allRecords : allRecords.filter(r => r.userId === userId);
    const total = filtered.reduce((s, r) => s + (r.hours || 0), 0);

    document.getElementById("view-title").textContent = userId === "all"
      ? "全部成員紀錄"
      : (allUsers.find(u => u.id === userId)?.nickname || userId) + " 的紀錄";
    document.getElementById("view-total").textContent = `${filtered.length} 筆 / ${total % 1 === 0 ? total : total.toFixed(1)} 小時`;

    const tbody = document.getElementById("records-body");
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-row">尚無紀錄</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(r => `
      <tr data-id="${r.id}">
        <td><span class="cell-view user-tag">${escHtml(r.nickname || r.userId)}</span></td>
        <td>
          <span class="cell-view">${r.date}</span>
          <input class="cell-edit" type="date" value="${r.date}" style="display:none">
        </td>
        <td>
          <span class="cell-view">${escHtml(r.project)}</span>
          <input class="cell-edit" type="text" value="${escHtml(r.project)}" style="display:none" placeholder="專案">
        </td>
        <td>
          <span class="cell-view">${escHtml(r.content)}</span>
          <input class="cell-edit" type="text" value="${escHtml(r.content)}" style="display:none" placeholder="工作內容">
        </td>
        <td>
          <span class="cell-view">${r.hours}</span>
          <input class="cell-edit" type="number" value="${r.hours}" style="display:none" step="0.5" min="0.5">
        </td>
        <td class="action-cell">
          <button class="btn-edit" onclick="adminStartEdit('${r.id}')">編輯</button>
          <button class="btn-save" onclick="adminSaveEdit('${r.id}')" style="display:none">儲存</button>
          <button class="btn-cancel" onclick="adminCancelEdit()" style="display:none">取消</button>
          <button class="btn-delete" onclick="adminDeleteRecord('${r.id}')">刪除</button>
        </td>
      </tr>
    `).join("");
  }

  function adminStartEdit(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    row.querySelectorAll(".cell-view").forEach(el => el.style.display = "none");
    row.querySelectorAll(".cell-edit").forEach(el => el.style.display = "");
    row.querySelector(".btn-edit").style.display = "none";
    row.querySelector(".btn-save").style.display = "";
    row.querySelector(".btn-cancel").style.display = "";
    row.querySelector(".btn-delete").style.display = "none";
    row.classList.add("editing");
  }
  window.adminStartEdit = adminStartEdit;

  function adminCancelEdit() { renderTable(currentView); }
  window.adminCancelEdit = adminCancelEdit;

  async function adminSaveEdit(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    const inputs = row.querySelectorAll(".cell-edit");
    const date = inputs[0].value;
    const project = inputs[1].value.trim();
    const content = inputs[2].value.trim();
    const hours = parseFloat(inputs[3].value);
    if (!date || !project || !content || !hours) { alert("請填寫所有欄位"); return; }
    await updateDoc(doc(db, "records", id), { date, project, content, hours, updatedAt: new Date().toISOString() });
    // 更新本地
    const idx = allRecords.findIndex(r => r.id === id);
    if (idx >= 0) Object.assign(allRecords[idx], { date, project, content, hours });
    renderSidebar();
    renderTable(currentView);
  }
  window.adminSaveEdit = adminSaveEdit;

  async function adminDeleteRecord(id) {
    if (!confirm("確定刪除這筆紀錄？此操作無法復原。")) return;
    await deleteDoc(doc(db, "records", id));
    allRecords = allRecords.filter(r => r.id !== id);
    renderSidebar();
    renderTable(currentView);
  }
  window.adminDeleteRecord = adminDeleteRecord;

  // 合併暱稱功能
  async function mergeNicknames() {
    const from = document.getElementById("merge-from").value.trim();
    const to = document.getElementById("merge-to").value.trim();
    if (!from || !to) { alert("請輸入來源和目標暱稱"); return; }
    if (from === to) { alert("來源和目標不能相同"); return; }
    if (!confirm(`確定將「${from}」的所有紀錄移至「${to}」？`)) return;

    // 找到所有 from 的 records
    const recs = allRecords.filter(r => r.userId === from || r.nickname === from);
    if (recs.length === 0) { alert(`找不到暱稱「${from}」的紀錄`); return; }

    const batch = writeBatch(db);
    recs.forEach(r => {
      batch.update(doc(db, "records", r.id), { userId: to, nickname: to });
    });
    await batch.commit();

    alert(`已將 ${recs.length} 筆紀錄從「${from}」合併至「${to}」`);
    document.getElementById("merge-from").value = "";
    document.getElementById("merge-to").value = "";
    loadAll();
  }
  window.mergeNicknames = mergeNicknames;

  // 匯出全部
  function exportAll() {
    const filtered = currentView === "all" ? allRecords : allRecords.filter(r => r.userId === currentView);
    const BOM = "\uFEFF";
    const header = "暱稱,日期,專案名稱,工作內容,時數\n";
    const rows = filtered.map(r => `"${r.nickname||r.userId}",${r.date},"${r.project}","${r.content}",${r.hours}`).join("\n");
    const blob = new Blob([BOM + header + rows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `工時記錄_後台_${currentView === "all" ? "全部" : currentView}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
  window.exportAll = exportAll;

  function escHtml(str) {
    return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // 月份篩選
  function filterMonth() {
    const m = document.getElementById("admin-filter-month").value;
    const base = currentView === "all" ? allRecords : allRecords.filter(r => r.userId === currentView);
    const filtered = m ? base.filter(r => r.date.startsWith(m)) : base;
    const total = filtered.reduce((s, r) => s + (r.hours || 0), 0);
    document.getElementById("view-total").textContent = `${filtered.length} 筆 / ${total % 1 === 0 ? total : total.toFixed(1)} 小時`;
    const tbody = document.getElementById("records-body");
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-row">無符合紀錄</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(r => `
      <tr data-id="${r.id}">
        <td><span class="cell-view user-tag">${escHtml(r.nickname || r.userId)}</span></td>
        <td><span class="cell-view">${r.date}</span><input class="cell-edit" type="date" value="${r.date}" style="display:none"></td>
        <td><span class="cell-view">${escHtml(r.project)}</span><input class="cell-edit" type="text" value="${escHtml(r.project)}" style="display:none" placeholder="專案"></td>
        <td><span class="cell-view">${escHtml(r.content)}</span><input class="cell-edit" type="text" value="${escHtml(r.content)}" style="display:none" placeholder="工作內容"></td>
        <td><span class="cell-view">${r.hours}</span><input class="cell-edit" type="number" value="${r.hours}" style="display:none" step="0.5" min="0.5"></td>
        <td class="action-cell">
          <button class="btn-edit" onclick="adminStartEdit('${r.id}')">編輯</button>
          <button class="btn-save" onclick="adminSaveEdit('${r.id}')" style="display:none">儲存</button>
          <button class="btn-cancel" onclick="adminCancelEdit()" style="display:none">取消</button>
          <button class="btn-delete" onclick="adminDeleteRecord('${r.id}')">刪除</button>
        </td>
      </tr>
    `).join("");
  }
  window.filterMonth = filterMonth;

  // DOM ready
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("pw-input").addEventListener("keydown", e => {
      if (e.key === "Enter") checkLogin();
    });
    document.getElementById("login-btn").addEventListener("click", checkLogin);

    // 設本月預設
    const now = new Date();
    const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    document.getElementById("admin-filter-month").value = ym;
  });
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #111210;
    --surface: #1c1d1b;
    --surface2: #252620;
    --border: #2e2f2a;
    --text: #e8e6e0;
    --text-sub: #7a7870;
    --accent: #d4763a;
    --accent-light: rgba(212,118,58,.15);
    --green: #5aaa7a;
    --green-light: rgba(90,170,122,.15);
    --red: #cc4444;
    --red-light: rgba(204,68,68,.15);
    --shadow: 0 2px 8px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 340px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .login-card .logo {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 22px; color: #fff;
  }

  .login-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-card p { font-size: 12.5px; color: var(--text-sub); margin-bottom: 28px; }

  .login-card input {
    width: 100%;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    outline: none;
    text-align: center;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .login-card input:focus { border-color: var(--accent); }

  .login-card button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity .2s;
  }
  .login-card button:hover { opacity: .88; }

  /* ── APP ── */
  #app-screen { display: none; height: 100vh; overflow: hidden; display: none; flex-direction: column; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff;
    flex-shrink: 0;
  }

  .topbar-title { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
  .admin-badge {
    background: var(--accent-light);
    border: 1px solid rgba(212,118,58,.3);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .merge-section {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
  }

  .merge-section label {
    font-size: 11px;
    color: var(--text-sub);
    white-space: nowrap;
  }

  .merge-section input {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 12px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    width: 90px;
    transition: border-color .2s;
  }
  .merge-section input:focus { border-color: var(--accent); }

  .btn-merge {
    padding: 4px 10px;
    background: var(--accent-light);
    border: 1px solid rgba(212,118,58,.3);
    border-radius: 5px;
    font-size: 12px;
    font-family: inherit;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .btn-merge:hover { opacity: .8; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 16px 8px;
  }

  #user-list { list-style: none; }

  .user-item {
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
    gap: 6px;
  }
  .user-item:hover { background: var(--surface2); }
  .user-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .user-name-item {
    font-size: 13.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .count-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-sub);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .user-item.active .count-badge { color: var(--accent); opacity: .7; }

  /* ── CONTENT ── */
  .content {
    overflow: auto;
    display: flex;
    flex-direction: column;
  }

  .content-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .content-header-left { display: flex; align-items: center; gap: 10px; }
  #view-title { font-size: 14px; font-weight: 600; }
  #view-total {
    font-size: 12.5px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid rgba(212,118,58,.25);
    border-radius: 20px;
    padding: 2px 10px;
  }

  .content-header-right { display: flex; align-items: center; gap: 8px; }

  .content-header input[type="month"] {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
    font-family: inherit;
    background: var(--surface2);
    color: var(--text);
    outline: none;
  }

  .btn-export {
    padding: 5px 12px;
    background: var(--green-light);
    border: 1px solid rgba(90,170,122,.3);
    border-radius: 6px;
    font-size: 12.5px;
    font-family: inherit;
    color: var(--green);
    cursor: pointer;
    font-weight: 500;
    transition: opacity .2s;
  }
  .btn-export:hover { opacity: .8; }

  .btn-reload {
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
    font-family: inherit;
    color: var(--text-sub);
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-reload:hover { color: var(--text); }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface2); position: sticky; top: 0; }
  thead th {
    padding: 9px 14px;
    text-align: left;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.07em;
    border-bottom: 1px solid var(--border);
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.editing { background: rgba(212,118,58,.06); }
  tbody td { padding: 9px 14px; vertical-align: middle; }

  .user-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 12px;
    white-space: nowrap;
  }

  td:nth-child(5) {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent);
  }

  .empty-row {
    text-align: center;
    color: var(--text-sub);
    padding: 48px !important;
    font-size: 13px;
  }

  .cell-edit {
    width: 100%;
    padding: 5px 8px;
    border: 1.5px solid var(--accent);
    border-radius: 5px;
    font-size: 12.5px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  .action-cell { display: flex; gap: 4px; align-items: center; white-space: nowrap; }

  .btn-edit, .btn-save, .btn-cancel, .btn-delete {
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid;
    font-size: 11.5px;
    font-family: inherit;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-edit { background: var(--surface2); border-color: var(--border); color: var(--text-sub); }
  .btn-edit:hover { color: var(--accent); border-color: var(--accent); }
  .btn-save { background: var(--green-light); border-color: rgba(90,170,122,.3); color: var(--green); }
  .btn-cancel { background: var(--surface2); border-color: var(--border); color: var(--text-sub); }
  .btn-delete { background: var(--red-light); border-color: rgba(204,68,68,.3); color: var(--red); }
  .btn-delete:hover, .btn-save:hover { opacity: .8; }

  #loading {
    position: fixed;
    inset: 0;
    background: rgba(17,18,16,.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-size: 14px;
    color: var(--text-sub);
    letter-spacing: 0.05em;
  }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .merge-section { display: none; }
  }
</style>
</head>
<body>

<div id="loading" style="display:none">載入中…</div>

<!-- ── 登入 ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🛠</div>
    <h1>後台管理</h1>
    <p>僅限管理員使用</p>
    <input type="password" id="pw-input" placeholder="輸入管理員密碼">
    <button id="login-btn">登入</button>
  </div>
</div>

<!-- ── 主畫面 ── -->
<div id="app-screen" style="display:none;flex-direction:column;height:100vh;">
  <nav class="topbar">
    <div class="logo">🛠</div>
    <span class="topbar-title">工時記錄器</span>
    <span class="admin-badge">Admin</span>
    <div class="topbar-actions">
      <div class="merge-section">
        <label>合併暱稱：</label>
        <input type="text" id="merge-from" placeholder="來源暱稱">
        <span style="color:var(--text-sub);font-size:12px;">→</span>
        <input type="text" id="merge-to" placeholder="目標暱稱">
        <button class="btn-merge" onclick="mergeNicknames()">執行合併</button>
      </div>
    </div>
  </nav>

  <div class="layout" style="flex:1;overflow:hidden;">
    <div class="sidebar">
      <div class="sidebar-title">成員列表</div>
      <ul id="user-list"></ul>
    </div>
    <div class="content">
      <div class="content-header">
        <div class="content-header-left">
          <span id="view-title">全部成員紀錄</span>
          <span id="view-total">—</span>
        </div>
        <div class="content-header-right">
          <input type="month" id="admin-filter-month" onchange="filterMonth()">
          <button class="btn-export" onclick="exportAll()">↓ 匯出 CSV</button>
          <button class="btn-reload" onclick="loadAll()">↺ 重新整理</button>
        </div>
      </div>
      <div style="overflow:auto;flex:1;">
        <table>
          <thead>
            <tr>
              <th>暱稱</th>
              <th>日期</th>
              <th>專案名稱</th>
              <th>工作內容</th>
              <th>時數 (h)</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="records-body">
            <tr><td colspan="6" class="empty-row">請先登入</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
